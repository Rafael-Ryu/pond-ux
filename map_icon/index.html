<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>Bases D3 - Mapa Incêndios</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0f172a; font-family: sans-serif; }
    #map { width: 100vw; height: 100vh; }

    #tooltip {
      position: absolute;
      background: rgba(0,0,0,0.85);
      color: #fff;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 13px;
      pointer-events: none;
      display: none;
      z-index: 600;
      line-height: 1.8;
      white-space: nowrap;
      border: 1px solid rgba(59,130,246,0.4);
    }

    #panel {
      position: absolute;
      top: 16px; right: 16px;
      width: 270px;
      background: rgba(15,23,42,0.93);
      border: 1px solid rgba(59,130,246,0.28);
      border-radius: 14px;
      z-index: 600;
      padding: 14px 14px 10px;
      color: #f1f5f9;
    }
    #panel h2 {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: #93c5fd;
      margin-bottom: 4px;
    }
    #panel p {
      font-size: 10px;
      color: #475569;
      margin-bottom: 8px;
      line-height: 1.4;
    }
    .clg {
      display: flex;
      gap: 10px;
      margin-top: 7px;
      flex-wrap: wrap;
    }
    .clg span {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 9px;
      color: #475569;
    }
    .clg i {
      width: 8px; height: 8px;
      border-radius: 1px;
      display: inline-block;
    }

    #legend {
      position: absolute;
      bottom: 20px; left: 16px;
      background: rgba(15,23,42,0.93);
      border: 1px solid rgba(59,130,246,0.28);
      border-radius: 12px;
      padding: 12px 15px;
      z-index: 600;
      color: #94a3b8;
      font-size: 11px;
      line-height: 1.85;
    }
    #legend strong {
      display: block;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: #93c5fd;
      margin-bottom: 5px;
    }
    .lr { display: flex; align-items: center; gap: 7px; }
    .ld { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
    .lhint { font-size: 10px; color: #334155; line-height: 1.65; margin-top: 5px; }

    .brush .selection {
      fill: rgba(59,130,246,0.1);
      stroke: rgba(59,130,246,0.4);
    }
    .brush .handle { fill: rgba(59,130,246,0.4); }
    .brush .overlay { fill: transparent; }
  </style>
</head>
<body>

<div id="map"></div>
<div id="tooltip"></div>

<div id="panel">
  <h2>Recursos por Base</h2>
  <p>Arraste para selecionar · Scroll para zoom</p>
  <div id="chart"></div>
  <div class="clg">
    <span><i style="background:#f97316"></i>Brigadistas</span>
    <span><i style="background:#3b82f6"></i>Caminhoes x3</span>
    <span><i style="background:#a855f7"></i>Avioes x8</span>
  </div>
</div>

<div id="legend">
  <strong>Legenda</strong>
  <div class="lr"><span class="ld" style="background:#3b82f6"></span>Base ativa</div>
  <div class="lr"><span class="ld" style="background:#fb923c"></span>Selecionada (brush)</div>
  <div class="lhint">
    Hover: recursos da base<br>
    Click: aproximar no mapa<br>
    Arrastar (painel): selecionar<br>
    Scroll (painel): zoom X
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
<script>

const bases = [
  { id:1, nome:"Base Alpha",   estado:"MA", brigadistas:24, caminhoes:4, avioes:2, pos:{lat:-5.53,  lng:-45.54} },
  { id:2, nome:"Base Beta",    estado:"PI", brigadistas:18, caminhoes:3, avioes:1, pos:{lat:-7.20,  lng:-44.30} },
  { id:3, nome:"Base Gamma",   estado:"PA", brigadistas:31, caminhoes:6, avioes:3, pos:{lat:-4.10,  lng:-47.00} },
  { id:4, nome:"Base Delta",   estado:"TO", brigadistas:12, caminhoes:2, avioes:1, pos:{lat:-8.50,  lng:-42.80} },
  { id:5, nome:"Base Epsilon", estado:"MT", brigadistas:28, caminhoes:5, avioes:2, pos:{lat:-12.64, lng:-55.42} },
  { id:6, nome:"Base Zeta",    estado:"MS", brigadistas:20, caminhoes:4, avioes:2, pos:{lat:-20.44, lng:-54.65} },
  { id:7, nome:"Base Eta",     estado:"GO", brigadistas:15, caminhoes:3, avioes:1, pos:{lat:-16.34, lng:-49.00} },
  { id:8, nome:"Base Theta",   estado:"MG", brigadistas:22, caminhoes:4, avioes:2, pos:{lat:-18.10, lng:-44.38} },
];

let brushActive = false;
let selectedIds = new Set(bases.map(b => b.id));

const mapEl = document.getElementById("map");
const map = L.map("map", { scrollWheelZoom: true }).setView([-10.0, -50.0], 5);

L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
  attribution: "&copy; OpenStreetMap contributors"
}).addTo(map);

const wrapper = document.createElement("div");
wrapper.style.cssText = "position:absolute;top:0;left:0;width:100%;height:100%;z-index:500;pointer-events:none;";
mapEl.appendChild(wrapper);

const svg  = d3.select(wrapper).append("svg")
  .attr("width","100%").attr("height","100%")
  .style("overflow","visible");
const defs = svg.append("defs");

bases.forEach(b => {
  const gn = defs.append("radialGradient")
    .attr("id",`gn${b.id}`).attr("cx","40%").attr("cy","35%").attr("r","60%");
  gn.append("stop").attr("offset","0%").attr("stop-color","#60a5fa");
  gn.append("stop").attr("offset","100%").attr("stop-color","#1e3a8a");

  const gs = defs.append("radialGradient")
    .attr("id",`gs${b.id}`).attr("cx","40%").attr("cy","35%").attr("r","60%");
  gs.append("stop").attr("offset","0%").attr("stop-color","#fb923c");
  gs.append("stop").attr("offset","100%").attr("stop-color","#7c2d12");
});

const flt = defs.append("filter").attr("id","glow");
flt.append("feGaussianBlur").attr("stdDeviation","3").attr("result","coloredBlur");
const fm = flt.append("feMerge");
fm.append("feMergeNode").attr("in","coloredBlur");
fm.append("feMergeNode").attr("in","SourceGraphic");

const R = 28, RP = 48;
const tooltip = document.getElementById("tooltip");

function draw(animate = true) {
  svg.selectAll("g.base-marker").remove();

  bases.forEach((r, i) => {
    const pt    = map.latLngToContainerPoint([r.pos.lat, r.pos.lng]);
    const isSel = selectedIds.has(r.id);
    const isDim = brushActive && !isSel;
    const fill  = isSel ? `url(#gs${r.id})` : `url(#gn${r.id})`;
    const stroke= isSel ? "#fb923c" : "#3b82f6";
    const sc    = isDim ? 0.6 : 1;
    const op    = isDim ? 0.2 : 1;

    const g = svg.append("g")
      .attr("class","base-marker")
      .attr("transform", animate
        ? `translate(${pt.x},${pt.y}) scale(0)`
        : `translate(${pt.x},${pt.y}) scale(${sc})`)
      .attr("opacity", animate ? 1 : op);

    const pulse = g.append("circle")
      .attr("r", R).attr("fill","none")
      .attr("stroke", stroke).attr("stroke-width",2).attr("opacity",0.8);

    if (!isDim) {
      (function animatePulse() {
        pulse.attr("r",R).attr("opacity",0.8)
          .transition().duration(isSel ? 1100 : 1800).ease(d3.easeCubicOut)
          .attr("r",RP).attr("opacity",0)
          .on("end", animatePulse);
      })();
    }

    g.append("circle")
      .attr("r", R+4).attr("fill","none")
      .attr("stroke",stroke).attr("stroke-width",1.5).attr("opacity",0.4)
      .attr("filter","url(#glow)");

    g.append("circle")
      .attr("r", R).attr("fill",fill)
      .attr("stroke","#fff").attr("stroke-width",2);

    g.append("polygon").attr("points","0,-14 -12,2 12,2").attr("fill","#fff");
    g.append("rect").attr("x",-9).attr("y",2)
      .attr("width",18).attr("height",10).attr("rx",1).attr("fill","#fff");
    g.append("rect").attr("x",-3).attr("y",4)
      .attr("width",6).attr("height",8).attr("rx",1).attr("fill",fill);

    const lw = r.nome.length * 7 + 20, ly = R + 16;
    g.append("rect")
      .attr("x",-lw/2).attr("y",ly-10)
      .attr("width",lw).attr("height",20).attr("rx",10)
      .attr("fill", isSel ? "#7c2d12" : "#002884")
      .attr("stroke","#fff").attr("stroke-width",1);
    g.append("text")
      .attr("y",ly+5).attr("text-anchor","middle")
      .attr("fill","#fff").attr("font-size","11px").attr("font-weight","600")
      .text(r.nome);

    g.append("circle").attr("r",R).attr("fill","transparent")
      .style("pointer-events","all").style("cursor","pointer")
      .on("mouseenter", function(event) {
        tooltip.innerHTML = `
          <strong>${r.nome}</strong> <span style="color:#64748b">(${r.estado})</span><br>
          Brigadistas: <b>${r.brigadistas}</b><br>
          Caminhoes: <b>${r.caminhoes}</b><br>
          Avioes: <b>${r.avioes}</b>`;
        const rect = mapEl.getBoundingClientRect();
        tooltip.style.left = (event.clientX - rect.left + 14) + "px";
        tooltip.style.top  = (event.clientY - rect.top  - 10) + "px";
        tooltip.style.display = "block";
      })
      .on("mousemove", function(event) {
        const rect = mapEl.getBoundingClientRect();
        tooltip.style.left = (event.clientX - rect.left + 14) + "px";
        tooltip.style.top  = (event.clientY - rect.top  - 10) + "px";
      })
      .on("mouseleave", () => { tooltip.style.display = "none"; })
      .on("click", () => {
        tooltip.style.display = "none";
        map.flyTo([r.pos.lat, r.pos.lng], Math.max(map.getZoom()+1, 10), {
          animate: true, duration: 1.2
        });
      });

    if (animate) {
      g.transition().duration(500).delay(i * 80)
        .ease(d3.easeBackOut.overshoot(1.4))
        .attr("transform",`translate(${pt.x},${pt.y}) scale(${sc})`)
        .attr("opacity", op);
    }
  });
}

draw();
["zoom","move","zoomend","moveend","viewreset"].forEach(e => map.on(e, () => draw(false)));

const cW = 242, cH = 210;
const M  = { t:4, r:6, b:22, l:72 };
const iW = cW - M.l - M.r;
const iH = cH - M.t - M.b;

const cSvg = d3.select("#chart").append("svg")
  .attr("width",cW).attr("height",cH);

cSvg.append("defs").append("clipPath").attr("id","clip")
  .append("rect").attr("width",iW).attr("height",iH);

const cg = cSvg.append("g").attr("transform",`translate(${M.l},${M.t})`);

const maxVal = d3.max(bases, b => b.brigadistas + b.caminhoes*3 + b.avioes*8);
const xSc = d3.scaleLinear().domain([0, maxVal*1.05]).range([0, iW]);
const ySc = d3.scaleBand().domain(bases.map(b=>b.nome)).range([0,iH]).padding(0.22);
const subH = ySc.bandwidth() / 3;
let curT = d3.zoomIdentity;

cg.append("g").call(d3.axisLeft(ySc).tickSize(0))
  .call(g => g.select(".domain").remove())
  .call(g => g.selectAll("text")
    .attr("fill","#64748b").attr("font-size","9px").attr("dx","-2px"));

const xAx = cg.append("g").attr("transform",`translate(0,${iH})`);
function updX(xS) {
  xAx.call(d3.axisBottom(xS).ticks(3).tickSize(-iH))
    .call(g => g.select(".domain").remove())
    .call(g => g.selectAll("line").attr("stroke","rgba(100,116,139,0.1)"))
    .call(g => g.selectAll("text").attr("fill","#475569").attr("font-size","8px"));
}
updX(xSc);

const barsG = cg.append("g").attr("clip-path","url(#clip)");

function drawBars(xS, animate=true) {
  barsG.selectAll("g.bg").remove();
  bases.forEach((b,i) => {
    const isSel = selectedIds.has(b.id);
    const op    = (brushActive && !isSel) ? 0.15 : 1;
    const bg    = barsG.append("g").attr("class","bg")
      .attr("transform",`translate(0,${ySc(b.nome)})`);

    [
      { val: b.brigadistas,   color:"#f97316", y:0      },
      { val: b.caminhoes * 3, color:"#3b82f6", y:subH   },
      { val: b.avioes * 8,    color:"#a855f7", y:subH*2 },
    ].forEach(({val,color,y},j) => {
      const r = bg.append("rect")
        .attr("x",0).attr("y",y)
        .attr("height",subH-1).attr("rx",1)
        .attr("fill",color).attr("opacity",op);
      if (animate) {
        r.attr("width",0)
          .transition().duration(600).delay(i*50+j*70).ease(d3.easeCubicOut)
          .attr("width", Math.max(0, xS(val)-xS(0)));
      } else {
        r.attr("width", Math.max(0, xS(val)-xS(0)));
      }
    });
  });
}
drawBars(xSc);

const zoom = d3.zoom()
  .scaleExtent([1, 8])
  .translateExtent([[0,0],[iW,iH]])
  .extent([[0,0],[iW,iH]])
  .filter(ev => ev.type === "wheel")
  .on("zoom", function(event) {
    curT = event.transform;
    const xS = event.transform.rescaleX(xSc);
    updX(xS);
    drawBars(xS, false);
  });
cSvg.call(zoom);

const brush = d3.brushY()
  .extent([[0,0],[iW,iH]])
  .on("brush", function(event) {
    if (!event.selection) return;
    const [y0,y1] = event.selection;
    brushActive  = true;
    selectedIds  = new Set(
      bases.filter(b => {
        const cy = ySc(b.nome) + ySc.bandwidth()/2;
        return cy >= y0 && cy <= y1;
      }).map(b => b.id)
    );
    if (!selectedIds.size) selectedIds = new Set(bases.map(b=>b.id));
    drawBars(curT.rescaleX(xSc), false);
    draw(false);
  })
  .on("end", function(event) {
    if (!event.selection) {
      brushActive = false;
      selectedIds = new Set(bases.map(b=>b.id));
      drawBars(curT.rescaleX(xSc), false);
      draw(false);
    }
  });

cg.append("g").attr("class","brush").call(brush);

</script>
</body>
</html>
